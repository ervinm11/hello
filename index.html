<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mautcha Café 🍵</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #7FB77E, #F7C8E0, #A8D8EA);
  overflow-x: hidden;
}

.cats {
  text-align: center;
  margin-top: 10px;
  color: #2f2f2f;
}

.cats h3 {
  margin: 5px;
  font-size: 18px;
}

.cats p {
  margin: 0;
  font-size: 14px;
  opacity: 0.8;
}

header {
  text-align: center;
  padding: 20px;
}

.menu {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

/* FIXED CARD CENTERING */
.card {
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  padding: 20px;
  width: 220px;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  backdrop-filter: blur(6px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  font-size: 15px;
  letter-spacing: 0.3px;
  gap: 6px;
}

.card:hover {
  transform: scale(1.05);
}

button {
  margin: 8px;
  padding: 10px 15px;
  border: none;
  border-radius: 12px;
  background: #7FB77E;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.85;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px;
}

.notes-panel {
  width: 340px;
  background: rgba(255,255,255,0.9);
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 12px 25px rgba(0,0,0,0.12);
  backdrop-filter: blur(10px);
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#notesList {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* RESTORED NOTES FORMAT */
.note-item {
  width: 90%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f7f7f7;
  padding: 10px;
  border-radius: 12px;
  font-size: 13px;
}

.note-item span {
  flex: 1;
  text-align: center;
  color: #333;
}

.note-item button {
  background: crimson;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 11px;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.4);
}

.receipt {
  background: white;
  padding: 20px;
  width: 280px;
  border-radius: 10px;
  font-family: monospace;
}

.close {
  text-align: right;
  cursor: pointer;
}

.petal {
  position: fixed;
  top: -10px;
  width: 10px;
  height: 10px;
  background: pink;
  border-radius: 50%;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<header>
  <h1>🍵 Matcha Café</h1>
  <p>A little space for you</p>
</header>

<div class="cats">
  <h3>🐾 Haru & Hiro</h3>
  <p>Her cats — Haru and Hiro. Soft little companions in her world.</p>
</div>

<section class="menu">
  <div class="card" onclick="showNote('latte')">🍵 Matcha Latte</div>
  <div class="card" onclick="showNote('strawberry')">🍓 Strawberry Matcha</div>
  <div class="card" onclick="showNote('blue')">🧊 Iced Blue Matcha</div>
</section>

<div style="text-align:center;">
  <button onclick="dailySpecial()">🎲 Daily Special</button>
  <button onclick="addNote()">💾 Add Note</button>
  <button onclick="unlockSecret()">🔒 Secret</button>
  <button onclick="toggleMusic()">🎵 Music</button>
</div>

<div class="container">
  <div class="notes-panel">
    <h3>💌 Mau Notes</h3>
    <div id="notesList"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="receipt">
    <div class="close" onclick="closeNote()">X</div>
    <pre id="receiptText"></pre>
  </div>
</div>

<audio id="music" loop>
  <source src="tenerife-sea.mp3" type="audio/mpeg">
</audio>

<script>
let notes = {
  latte: ["You make my days feel softer."],
  strawberry: ["You're really cute."],
  blue: ["Random thought: you crossed my mind again."]
};

if (localStorage.getItem("notes")) {
  notes = JSON.parse(localStorage.getItem("notes"));
}

function save() {
  localStorage.setItem("notes", JSON.stringify(notes));
  renderNotes();
}

function showNote(type) {
  const list = notes[type];
  const random = list[Math.floor(Math.random() * list.length)];
  displayReceipt(random);
}

function dailySpecial() {
  const all = [...notes.latte, ...notes.strawberry, ...notes.blue];
  const random = all[Math.floor(Math.random() * all.length)];
  displayReceipt("Daily Special\n\n" + random);
}

function displayReceipt(msg) {
  document.getElementById("receiptText").innerText =
`MATCHA CAFÉ
----------------
${msg}
----------------
Made with care 🍵`;
  document.getElementById("modal").style.display = "flex";
}

function closeNote() {
  document.getElementById("modal").style.display = "none";
}

function addNote() {
  const type = prompt("Category: latte / strawberry / blue");
  const text = prompt("Write your note:");

  if (notes[type] && text) {
    notes[type].push(text);
    save();
    alert("Saved!");
  }
}

function deleteNote(type, index) {
  notes[type].splice(index, 1);
  save();
}

function renderNotes() {
  const container = document.getElementById("notesList");
  container.innerHTML = "";

  Object.keys(notes).forEach(type => {
    notes[type].forEach((note, i) => {
      const div = document.createElement("div");
      div.className = "note-item";
      div.innerHTML = `
        <span>${note}</span>
        <button onclick="deleteNote('${type}', ${i})">X</button>
      `;
      container.appendChild(div);
    });
  });
}

let playing = false;
function toggleMusic() {
  const music = document.getElementById("music");
  if (!playing) music.play();
  else music.pause();
  playing = !playing;
}

function unlockSecret() {
  const code = prompt("Enter secret code:");
  if (code === "matcha") {
    displayReceipt("This one is special.\n\nI really, really like you.");
  } else {
    alert("Wrong code :(");
  }
}

function createPetal() {
  const petal = document.createElement("div");
  petal.classList.add("petal");
  petal.style.left = Math.random() * window.innerWidth + "px";
  petal.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(petal);
  setTimeout(() => petal.remove(), 5000);
}

setInterval(createPetal, 300);
renderNotes();
</script>

</body>
</html>
